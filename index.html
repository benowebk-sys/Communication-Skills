<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communication Skills Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bebo-wrapper">
        <div id="bebo-robot" class="bebo-robot"></div>
        <div id="bebo-bubble" class="bebo-bubble"></div>
    </div>

    <main class="container mx-auto px-4 py-8 flex-grow flex items-center justify-center">
        <div id="quiz-container" class="max-w-4xl w-full">
            <div class="flex justify-between items-center mb-6">
                <div id="question-number" class="text-xs tracking-widest text-slate-500 font-bold uppercase"></div>
                <div id="score-pill" class="bg-white/5 px-4 py-1 rounded-full text-[10px] font-bold tracking-tighter border border-white/10">SCORE: 0</div>
            </div>

            <div class="relative mb-8">
                <div id="question-text" class="text-xl md:text-2xl font-medium leading-relaxed mb-6"></div>
                <button onclick="toggleHint()" class="absolute -right-2 -top-2 bulb-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6m-3-3V9m0 12a9 9 0 1 1 0-18 9 9 0 0 1 0 18z"/></svg>
                </button>
                <div id="hint-text" class="hidden bg-white/5 p-4 rounded-sm text-sm text-slate-400 border-l-2 border-white/20 mb-4"></div>
            </div>

            <div id="options-container" class="grid gap-3 mb-10"></div>

            <div class="flex justify-between items-center border-t border-white/5 pt-6">
                <button id="prev-btn" onclick="prevQuestion()" class="text-xs font-bold tracking-widest text-slate-400 hover:text-white transition-colors uppercase">Previous</button>
                <div class="flex-grow mx-8 h-[2px] bg-white/5 relative">
                    <div id="progress-fill" class="absolute h-full bg-white transition-all duration-500" style="width: 0%"></div>
                </div>
                <button id="next-btn" onclick="nextQuestion()" disabled class="text-xs font-bold tracking-widest text-white hover:opacity-70 disabled:opacity-20 transition-all uppercase">Next Point</button>
            </div>
        </div>

        <div id="result-view" class="hidden text-center max-w-md">
            <h1 class="text-6xl font-bold mb-4 tracking-tighter" id="final-score">0%</h1>
            <p id="result-message" class="text-slate-400 mb-8 leading-relaxed"></p>
            <button onclick="restartQuiz()" class="border border-white/20 px-8 py-3 text-xs font-bold tracking-widest hover:bg-white hover:text-black transition-all uppercase">Try Again</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
